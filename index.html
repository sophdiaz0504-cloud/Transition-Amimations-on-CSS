<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> popular flowers in Japan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Popular Flowers in Japan</h1>
      <p> Cherry Blossoms, Wisteria, and Red spider Lily </p>
    </header>

    <main>
      <section class="Flowers">
       <div class="card Cherry Blossoms">
          <img src="https://github.com/sophdiaz0504-cloud/Transition-Amimations-on-CSS/blob/ca664301d7d280a999d58e526c6c0873426d5f77/assets/Cherry%20Blossom%20Tree.jpg" alt="Cherry Blossoms"/>
          <p>In Japanse, Cherry Blossoms is called Sakura.</p>
        </div>
      <div class="card Wisteria Tree">
          <img src="https://github.com/sophdiaz0504-cloud/Transition-Amimations-on-CSS/blob/923c69634c72f827f6d1be51be405c93c79491ca/assets/wisteria%20Trees.jpg" alt="Wisteria Tree"/>
          <p>In Japanse, Wisteria Tree is called Fuji </p>
        </div>
        <div class="card Red Spider Lily">
          <img src="https://github.com/sophdiaz0504-cloud/Transition-Amimations-on-CSS/blob/923c69634c72f827f6d1be51be405c93c79491ca/assets/Red%20Spider%20Lily%20Flower.jpg" alt="Red Lily Flower" />
          <p>In Japanse, a red spider lily will be called higanbana.</p>
        </div>
      </section>

      <section class="cta">
        <button class="btn">More Popular Flowers</button>
      </section>
    </main>

    <footer>
      <p>CLICK HERE FOR MORE INFORMATION</p>
    </footer>
  </body>
</html>
